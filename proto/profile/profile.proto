syntax = "proto3";

package ngprofile.v1;

option go_package = "github.com/OpenBuilders/not-games-sdk-public/gen/grpc/go/profile";

service ProfileService {
  rpc SocialLogin(SocialLoginRequest) returns (SocialLoginResponse) {}
  rpc ExternalAuth(ExternalAuthRequest) returns (ExternalAuthResponse) {}
}

message SocialLoginRequest {
  string provider = 1;
  string external_id = 2;
  optional string username = 3;
  optional string first_name = 4;
  optional string last_name = 5;
  optional string locale = 6;
  optional string avatar = 7;
}

message SocialLoginResponse {
  int64 account_id = 1;
}

message ExternalAuthRequest {
  string provider = 1;
  map<string, string> data = 2;
}

message ExternalAuthResponse {
  int64 account_id = 1;
  string provider = 2;
  string external_id = 3;
  optional string username = 4;
  optional string avatar = 5;
  optional string first_name = 6;
  optional string last_name = 7;
  optional string locale = 8;
}