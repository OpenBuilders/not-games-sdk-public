syntax = "proto3";

package ngfriends.v1;

option go_package = "github.com/OpenBuilders/not-games-sdk-public/gen/grpc/go/friends";

import "google/protobuf/timestamp.proto";
import "common/account.proto";

service FriendsService {
  rpc SendFriendRequest(SendFriendRequestRequest) returns (SendFriendRequestResponse) {}
  rpc RespondToFriendRequest(RespondToFriendRequestRequest) returns (RespondToFriendRequestResponse) {}
  rpc CancelFriendRequest(CancelFriendRequestRequest) returns (CancelFriendRequestResponse) {}
  rpc RemoveFriend(RemoveFriendRequest) returns (RemoveFriendResponse) {}
  rpc ListFriends(ListFriendsRequest) returns (ListFriendsResponse) {}
  rpc ListIncomingRequests(ListFriendRequestsRequest) returns (ListFriendRequestsResponse) {}
  rpc ListOutgoingRequests(ListFriendRequestsRequest) returns (ListFriendRequestsResponse) {}
  rpc GetFriendsPage(GetFriendsPageRequest) returns (GetFriendsPageResponse) {}
}

message FriendActivity {
  int64 app_id = 1;
  google.protobuf.Timestamp started_at = 2;
}

message FriendAccount {
  common.v1.Account account = 1;
  optional FriendActivity activity = 2;
}

message FriendRequest {
  int64 id = 1;
  int64 from_account_id = 2;
  int64 to_account_id = 3;
  string status = 4;
  optional FriendAccount from_account = 5;
  optional FriendAccount to_account = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

message SendFriendRequestRequest {
  int64 to_account_id = 1;
}

message SendFriendRequestResponse {}

message CancelFriendRequestRequest {
  int64 request_id = 1;
}

message CancelFriendRequestResponse {
}

message RespondToFriendRequestRequest {
  int64 request_id = 1;
  bool accept = 2;
}

message RespondToFriendRequestResponse {}

message RemoveFriendRequest {
  int64 friend_id = 1;
}

message RemoveFriendResponse {}

message ListFriendsRequest {
  optional string search = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message ListFriendsResponse {
  repeated FriendAccount items = 1;
  int32 total = 2;
}

message ListFriendRequestsRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message ListFriendRequestsResponse {
  repeated FriendRequest items = 1;
  int32 total = 2;
}

message GetFriendsPageRequest {}

message GetFriendsPageResponse {
  ListFriendsResponse friends = 1;
  ListFriendRequestsResponse incoming_requests = 2;
  ListFriendRequestsResponse outgoing_requests = 3;
}
